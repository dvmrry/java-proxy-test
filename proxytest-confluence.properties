# ProxyTest Configuration - Confluence/CATALINA_OPTS environment
# Mirrors the JVM properties set by the Confluence setenv.sh
# Copy this to proxytest.properties or run: java ProxyTest proxytest-confluence.properties

proxy.mode=config
proxy.host=proxy.example.com
proxy.port=9443

truststore.path=/etc/pki/java/cacerts
truststore.password=changeit

nonProxyHosts=*.example.com|*.internal.net|localhost

timeout.connect=10
timeout.request=30
http.method=GET
http.body=
targets=builtin
# Skip phases (comma-separated): dns, tcp, tls, connect, http
skip=
show.full.body=false
verbose=true

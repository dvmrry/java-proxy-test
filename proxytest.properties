# ProxyTest Configuration
# Edit and re-run - no recompilation needed.

# Proxy settings
# "system" = use JVM -D props (e.g. from CATALINA_OPTS) with config as fallback
# "none"   = direct connection, no proxy
# "config" = always use proxy.host/proxy.port below
proxy.mode=config
proxy.host=proxy.example.com
proxy.port=9443

# Custom trust store (leave blank to use Java default)
# Example for RHEL/CentOS: /etc/pki/java/cacerts
truststore.path=
truststore.password=changeit

# nonProxyHosts - hosts that bypass the proxy (pipe-delimited)
# Example: *.example.com|*.internal.net|localhost
nonProxyHosts=

# Timeouts (seconds)
timeout.connect=10
timeout.request=30

# HTTP method: GET, PUT, or POST
http.method=GET

# PUT/POST body
http.body={"test": true}

# Target URLs to test (comma-separated, or "builtin" for defaults)
# Examples:
#   targets=builtin
#   targets=https://some-internal-app.example.com/status
#   targets=https://httpbin.org/get,https://example.com
targets=builtin

# Skip phases (comma-separated): dns, tcp, tls, connect, http
skip=

# Show full response body
show.full.body=false

# Verbose output
verbose=true
